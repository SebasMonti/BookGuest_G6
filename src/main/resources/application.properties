spring.application.name=bookguest

# Puerto del servidor web
server.port=91

# Formato de fecha/hora en el log
logging.pattern.dateformat=hh:mm

# Elimina el banner de Spring al iniciar
spring.main.banner-mode=off

# Evita cache de Thymeleaf en desarrollo
spring.thymeleaf.cache=false

# Conexion local a la BD BookGuest en MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bookguest?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Usuario y clave de la base de datos
spring.datasource.username=usuario_bookguest
spring.datasource.password=BookGuest_2026

# Driver y dialecto de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL en consola
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE

# Internacionalizacion
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Firebase Storage
# De momento se deja preparado, primero se trabaja en localhost
firebase.bucket.name=bookguest-36f8e.firebasestorage.app
firebase.storage.path=bookguest
firebase.json.path=firebase
firebase.json.file=bookguest-36f8e-firebase-adminsdk-fbsvc-c4bbaa9be2.json
