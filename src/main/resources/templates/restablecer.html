<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <head>
        <title>[[#{auth.restablecer.titulo}]] - [[#{aplicacion.titulo}]]</title>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

        <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" rel="stylesheet"/>
        <link th:href="@{/webjars/font-awesome/7.2.0/css/all.css}" rel="stylesheet"/>

        <style>
            :root {
                --bookguest-blue: #003F63;
                --bookguest-bg: #F1F2F4;
                --bookguest-text: #111827;
                --bookguest-muted: #6B7280;
                --bookguest-border: #DDE2EA;
            }

            * {
                box-sizing: border-box;
            }

            html, body {
                width: 100%;
                min-height: 100%;
                margin: 0;
                background-color: var(--bookguest-bg);
                font-family: Arial, Helvetica, sans-serif;
                color: var(--bookguest-text);
            }

            .auth-wrapper {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 34px 18px;
            }

            .auth-card {
                width: min(100%, 460px);
                background-color: #FFFFFF;
                border: 1px solid var(--bookguest-border);
                box-shadow: 0 4px 18px rgba(15, 23, 42, 0.08);
                padding: 38px 36px;
            }

            .auth-brand {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                color: var(--bookguest-blue);
                font-weight: 700;
                font-size: 22px;
                margin-bottom: 26px;
            }

            .auth-brand i {
                font-size: 34px;
            }

            .auth-title {
                font-size: 24px;
                font-weight: 700;
                text-align: center;
                margin-bottom: 8px;
            }

            .auth-subtitle {
                font-size: 14px;
                color: var(--bookguest-muted);
                text-align: center;
                margin-bottom: 28px;
            }

            .auth-label {
                font-size: 13px;
                font-weight: 600;
                margin-bottom: 7px;
            }

            .auth-control {
                height: 42px;
                border: 1px solid var(--bookguest-border);
                border-radius: 2px;
                font-size: 14px;
            }

            .auth-control:focus {
                border-color: var(--bookguest-blue);
                box-shadow: none;
            }

            .auth-button {
                width: 100%;
                height: 44px;
                background-color: var(--bookguest-blue);
                border: 1px solid var(--bookguest-blue);
                color: #FFFFFF;
                font-size: 14px;
                font-weight: 600;
                margin-top: 8px;
            }

            .auth-button:hover {
                background-color: #002F4A;
                color: #FFFFFF;
            }

            .auth-links {
                margin-top: 22px;
                text-align: center;
                font-size: 13px;
            }

            .auth-links a {
                color: var(--bookguest-blue);
                text-decoration: none;
                font-weight: 600;
            }

            .auth-links a:hover {
                text-decoration: underline;
            }

            .auth-alert {
                font-size: 13px;
                border-radius: 2px;
                padding: 11px 14px;
            }
        </style>
    </head>

    <body>
        <main class="auth-wrapper">

            <section class="auth-card">

                <div class="auth-brand">
                    <i class="fa-solid fa-book-bookmark"></i>
                    <span>[[#{aplicacion.titulo}]]</span>
                </div>

                <h1 class="auth-title">[[#{auth.restablecer.titulo}]]</h1>

                <p class="auth-subtitle">
                    [[#{auth.restablecer.subtitulo}]]
                </p>

                <div th:if="${mensajeError}" class="alert alert-danger auth-alert" th:text="${mensajeError}"></div>

                <div th:if="${mensajeOk}" class="alert alert-success auth-alert" th:text="${mensajeOk}"></div>

                <form th:action="@{/restablecer}" method="post">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label for="email" class="auth-label">[[#{auth.campo.email}]]</label>
                        <input type="email"
                               id="email"
                               name="email"
                               class="form-control auth-control"
                               th:placeholder="#{auth.campo.email.placeholder}"
                               required="required"
                               autocomplete="email"/>
                    </div>

                    <div class="mb-3">
                        <label for="nuevaPassword" class="auth-label">[[#{auth.campo.password.nueva}]]</label>
                        <input type="password"
                               id="nuevaPassword"
                               name="nuevaPassword"
                               class="form-control auth-control"
                               th:placeholder="#{auth.campo.password.nueva.placeholder}"
                               required="required"
                               autocomplete="new-password"/>
                    </div>

                    <div class="mb-3">
                        <label for="confirmarPassword" class="auth-label">[[#{auth.campo.password.confirmarNueva}]]</label>
                        <input type="password"
                               id="confirmarPassword"
                               name="confirmarPassword"
                               class="form-control auth-control"
                               th:placeholder="#{auth.campo.password.confirmarNueva.placeholder}"
                               required="required"
                               autocomplete="new-password"/>
                    </div>

                    <button type="submit" class="auth-button">
                        [[#{auth.restablecer.boton}]]
                    </button>
                </form>

                <div class="auth-links">
                    [[#{auth.restablecer.recordo}]]
                    <a th:href="@{/login}">[[#{auth.restablecer.login}]]</a>
                </div>

            </section>

        </main>

        <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
    </body>
</html>
