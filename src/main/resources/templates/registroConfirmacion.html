<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: authHead(#{registro.confirmacion.titulo})}"></head>

    <body>
        <main class="confirmation-layout">
            <section class="confirmation-card">

                <div class="form-icon">
                    <i class="fa-solid fa-book-bookmark"></i>
                </div>

                <h1 class="confirmation-title">
                    [[#{registro.confirmacion.titulo}]]
                </h1>

                <p class="confirmation-text">
                    [[#{registro.confirmacion.texto}]]
                </p>

                <a th:href="@{/login}" class="btn-auth">
                    [[#{accion.iniciarSesion}]]
                </a>

            </section>
        </main>

        <section th:replace="~{general/fragmentos :: authScripts}"></section>
    </body>
</html>
