<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      th:lang="${#locale.language}">

    <head>
        <title>[[#{registro.titulo}]] - [[#{aplicacion.titulo}]]</title>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

        <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" rel="stylesheet"/>
        <link th:href="@{/webjars/font-awesome/7.2.0/css/all.css}" rel="stylesheet"/>

        <style>
            :root {
                --bookguest-blue: #003F63;
                --bookguest-button: #1E6BD6;
                --bookguest-text: #2F333A;
                --bookguest-muted: #6B7280;
                --bookguest-border: #D7DCE3;
                --bookguest-danger: #FF2F2F;
            }

            * {
                box-sizing: border-box;
            }

            html, body {
                width: 100%;
                min-height: 100%;
                margin: 0;
                background-color: #FFFFFF;
                font-family: Arial, Helvetica, sans-serif;
                color: var(--bookguest-text);
            }

            .register-wrapper {
                min-height: 100vh;
                display: flex;
                justify-content: center;
                padding: 14px 20px 28px;
            }

            .register-card {
                width: min(100%, 282px);
            }

            .register-brand {
                text-align: center;
                color: var(--bookguest-blue);
                font-size: 40px;
                line-height: 1;
                margin-bottom: 28px;
            }

            .register-title {
                font-size: 24px;
                font-weight: 700;
                line-height: 1.2;
                margin-bottom: 10px;
                color: #2E333B;
            }

            .register-subtitle {
                font-size: 13px;
                color: var(--bookguest-muted);
                margin-bottom: 18px;
            }

            .register-label {
                font-size: 12px;
                color: #374151;
                margin-bottom: 6px;
            }

            .register-control {
                height: 35px;
                border-radius: 7px;
                border: 1px solid var(--bookguest-border);
                font-size: 13px;
                padding-left: 12px;
                padding-right: 12px;
            }

            .register-control::placeholder {
                color: #7B8496;
            }

            .register-help {
                font-size: 12px;
                color: var(--bookguest-danger);
                margin-top: 4px;
                margin-bottom: 0;
            }

            .register-button {
                width: 100%;
                height: 35px;
                margin-top: 10px;
                background-color: var(--bookguest-button);
                border: 1px solid var(--bookguest-button);
                border-radius: 3px;
                font-size: 14px;
                font-weight: 500;
                color: #FFFFFF;
            }

            .register-button:hover {
                color: #FFFFFF;
                background-color: #195FC0;
                border-color: #195FC0;
            }

            .register-link-text {
                margin-top: 14px;
                font-size: 12px;
                color: var(--bookguest-muted);
                text-align: center;
            }

            .register-link {
                color: #0D6EFD;
                text-decoration: none;
                font-weight: 600;
            }

            .register-link:hover {
                text-decoration: underline;
            }

            .register-alert {
                font-size: 12px;
                padding: 8px 10px;
                border-radius: 4px;
            }
        </style>
    </head>

    <body>
        <main class="register-wrapper">
            <section class="register-card">

                <div class="register-brand">
                    <i class="fa-solid fa-book-bookmark"></i>
                </div>

                <h1 class="register-title">[[#{registro.titulo}]]</h1>

                <p class="register-subtitle">
                    [[#{registro.bienvenida}]]
                </p>

                <div th:if="${mensajeError}"
                     class="alert alert-danger register-alert"
                     th:text="${mensajeError}">
                </div>

                <div th:if="${mensajeOk}"
                     class="alert alert-success register-alert"
                     th:text="${mensajeOk}">
                </div>

                <form th:action="@{/registro}"
                      method="post"
                      class="bookguest-register-form"
                      novalidate="novalidate">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label for="nombre" class="register-label">
                            [[#{registro.nombre}]]
                        </label>

                        <input type="text"
                               id="nombre"
                               name="nombre"
                               class="form-control register-control"
                               th:placeholder="#{registro.nombre.placeholder}"
                               data-required="true"
                               autocomplete="given-name"/>
                    </div>

                    <div class="mb-3">
                        <label for="apellidos" class="register-label">
                            [[#{registro.apellidos}]]
                        </label>

                        <input type="text"
                               id="apellidos"
                               name="apellidos"
                               class="form-control register-control"
                               th:placeholder="#{registro.apellidos.placeholder}"
                               data-required="true"
                               autocomplete="family-name"/>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="register-label">
                            [[#{registro.email}]]
                        </label>

                        <input type="email"
                               id="email"
                               name="email"
                               class="form-control register-control"
                               th:placeholder="#{registro.email.placeholder}"
                               data-required="true"
                               data-tipo="email"
                               autocomplete="email"/>
                    </div>

                    <div class="mb-3">
                        <label for="telefono" class="register-label">
                            [[#{registro.telefono}]]
                        </label>

                        <input type="text"
                               id="telefono"
                               name="telefono"
                               class="form-control register-control"
                               th:placeholder="#{registro.telefono.placeholder}"
                               autocomplete="tel"/>
                    </div>

                    <div class="mb-3">
                        <label for="direccion" class="register-label">
                            [[#{registro.direccion}]]
                        </label>

                        <input type="text"
                               id="direccion"
                               name="direccion"
                               class="form-control register-control"
                               th:placeholder="#{registro.direccion.placeholder}"
                               autocomplete="street-address"/>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="register-label">
                            [[#{registro.password}]]
                        </label>

                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control register-control"
                               th:placeholder="#{registro.password.placeholder}"
                               data-required="true"
                               data-minimo="8"
                               data-password="true"
                               autocomplete="new-password"/>

                        <p class="register-help">
                            [[#{registro.password.requisito}]]
                        </p>
                    </div>

                    <div class="mb-3">
                        <label for="confirmarPassword" class="register-label">
                            [[#{registro.confirmacion}]]
                        </label>

                        <input type="password"
                               id="confirmarPassword"
                               name="confirmarPassword"
                               class="form-control register-control"
                               th:placeholder="#{registro.confirmacion.placeholder}"
                               data-required="true"
                               data-minimo="8"
                               data-password-confirmacion="true"
                               autocomplete="new-password"/>

                        <p class="register-help d-none" id="mensajeConfirmacion">
                            [[#{registro.confirmacion.error}]]
                        </p>
                    </div>

                    <button type="submit" class="register-button">
                        [[#{accion.registrar}]]
                    </button>
                </form>

                <div class="register-link-text">
                    [[#{registro.login.texto}]]
                    <a th:href="@{/login}" class="register-link">
                        [[#{registro.login.link}]]
                    </a>
                </div>

            </section>
        </main>

        <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>

        <script th:inline="javascript">
            const mensajesRegistro = {
                requerido: [[#{validacion.requerido}]],
                email: [[#{validacion.email}]],
                minimo: [[#{validacion.minimo}]],
                passwordCoincide: [[#{registro.confirmacion.error}]]
            };

            document.addEventListener("DOMContentLoaded", function () {
                const formulario = document.querySelector(".bookguest-register-form");
                const expresionEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                function limpiarMensaje(campo) {
                    campo.setCustomValidity("");
                }

                function validarCampo(campo) {
                    limpiarMensaje(campo);

                    const valor = campo.value.trim();

                    if (campo.dataset.required === "true" && valor.length === 0) {
                        campo.setCustomValidity(mensajesRegistro.requerido);
                        return false;
                    }

                    if (campo.dataset.tipo === "email" && valor.length > 0 && !expresionEmail.test(valor)) {
                        campo.setCustomValidity(mensajesRegistro.email);
                        return false;
                    }

                    if (campo.dataset.minimo) {
                        const minimo = parseInt(campo.dataset.minimo, 10);

                        if (valor.length > 0 && valor.length < minimo) {
                            campo.setCustomValidity(mensajesRegistro.minimo);
                            return false;
                        }
                    }

                    return true;
                }

                function validarConfirmacionPassword() {
                    const password = formulario.querySelector("[data-password]");
                    const confirmacion = formulario.querySelector("[data-password-confirmacion]");
                    const mensajeConfirmacion = document.getElementById("mensajeConfirmacion");

                    if (!password || !confirmacion) {
                        return true;
                    }

                    limpiarMensaje(confirmacion);

                    if (password.value.length > 0
                            && confirmacion.value.length > 0
                            && password.value !== confirmacion.value) {

                        confirmacion.setCustomValidity(mensajesRegistro.passwordCoincide);

                        if (mensajeConfirmacion) {
                            mensajeConfirmacion.classList.remove("d-none");
                        }

                        return false;
                    }

                    if (mensajeConfirmacion) {
                        mensajeConfirmacion.classList.add("d-none");
                    }

                    return true;
                }

                if (formulario) {
                    const campos = formulario.querySelectorAll("input");

                    campos.forEach(function (campo) {
                        campo.addEventListener("input", function () {
                            validarCampo(campo);
                            validarConfirmacionPassword();
                        });

                        campo.addEventListener("blur", function () {
                            validarCampo(campo);
                        });
                    });

                    formulario.addEventListener("submit", function (event) {
                        let formularioValido = true;
                        let primerCampoInvalido = null;

                        campos.forEach(function (campo) {
                            if (!validarCampo(campo)) {
                                formularioValido = false;

                                if (primerCampoInvalido === null) {
                                    primerCampoInvalido = campo;
                                }
                            }
                        });

                        if (!validarConfirmacionPassword()) {
                            formularioValido = false;

                            if (primerCampoInvalido === null) {
                                primerCampoInvalido = formulario.querySelector("[data-password-confirmacion]");
                            }
                        }

                        if (!formularioValido) {
                            event.preventDefault();

                            if (primerCampoInvalido) {
                                primerCampoInvalido.focus();
                                primerCampoInvalido.reportValidity();
                            }
                        }
                    });
                }
            });
        </script>
    </body>
</html>
