<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <head th:fragment="head(titulo)">
        <title>[[${titulo}]] - [[#{aplicacion.titulo}]]</title>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

        <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" rel="stylesheet"/>
        <link th:href="@{/webjars/font-awesome/7.2.0/css/all.css}" rel="stylesheet"/>

        <style>
            :root {
                --admin-blue: #004A78;
                --admin-bg: #F0F1F3;
                --admin-sidebar: #FFFFFF;
                --admin-text: #303846;
                --admin-muted: #667085;
                --admin-border: #E2E6EC;
                --admin-active-bg: #EEF6FF;
                --admin-active-text: #0D6EFD;
            }

            html, body {
                width: 100%;
                min-height: 100%;
                margin: 0;
                background-color: var(--admin-bg);
                font-family: Arial, Helvetica, sans-serif;
                color: var(--admin-text);
            }

            .admin-layout {
                min-height: 100vh;
                display: flex;
                background-color: var(--admin-bg);
            }

            .admin-sidebar {
                width: 250px;
                min-height: 100vh;
                background-color: var(--admin-sidebar);
                border-right: 1px solid var(--admin-border);
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                flex-shrink: 0;
                padding: 28px 26px;
                box-shadow: 2px 0 12px rgba(15, 23, 42, 0.03);
            }

            .admin-sidebar-top {
                display: block;
            }

            .admin-brand {
                display: flex;
                align-items: center;
                gap: 10px;
                color: var(--admin-blue);
                font-weight: 700;
                font-size: 18px;
                margin-bottom: 58px;
                text-decoration: none;
            }

            .admin-brand i {
                font-size: 36px;
            }

            .admin-menu,
            .admin-sidebar-bottom {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .admin-menu a,
            .admin-sidebar-bottom a,
            .admin-sidebar-bottom button {
                display: flex;
                align-items: center;
                gap: 14px;
                width: 100%;
                min-height: 42px;
                padding: 10px 12px;
                border: 0;
                border-radius: 8px;
                background-color: transparent;
                color: #344054;
                font-size: 14px;
                text-decoration: none;
                text-align: left;
                transition: background-color 0.15s ease, color 0.15s ease;
            }

            .admin-menu a:hover,
            .admin-sidebar-bottom a:hover,
            .admin-sidebar-bottom button:hover {
                background-color: var(--admin-active-bg);
                color: var(--admin-active-text);
            }

            .admin-menu a.active,
            .admin-sidebar-bottom a.active {
                background-color: var(--admin-active-bg);
                color: var(--admin-active-text);
                font-weight: 600;
            }

            .admin-menu i,
            .admin-sidebar-bottom i {
                width: 18px;
                text-align: center;
                font-size: 15px;
            }

            .admin-sidebar-bottom form {
                margin: 0;
            }

            .admin-main {
                flex: 1;
                min-width: 0;
                min-height: 100vh;
                background-color: var(--admin-bg);
            }

            .admin-topbar {
                height: 82px;
                background-color: #FFFFFF;
                border-bottom: 1px solid var(--admin-border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 42px;
            }

            .admin-search {
                width: 355px;
                height: 36px;
                border: 1px solid var(--admin-border);
                border-radius: 5px;
                background-color: #FFFFFF;
                display: flex;
                align-items: center;
                padding: 0 14px;
                gap: 10px;
                color: #98A2B3;
            }

            .admin-search input {
                width: 100%;
                border: 0;
                outline: 0;
                background-color: transparent;
                font-size: 13px;
                color: var(--admin-text);
            }

            .admin-search input::placeholder {
                color: #98A2B3;
            }

            .admin-top-icons {
                display: flex;
                align-items: center;
                gap: 28px;
                color: #344054;
                font-size: 18px;
            }

            .admin-content {
                padding: 24px 28px 40px 28px;
                background-color: var(--admin-bg);
            }

            .admin-card {
                background-color: #FFFFFF;
                border-radius: 8px;
                border: 1px solid var(--admin-border);
            }

            .admin-card-title {
                font-size: 18px;
                font-weight: 500;
                margin-bottom: 20px;
            }

            .metric-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
            }

            .metric-grid.two {
                grid-template-columns: repeat(2, 1fr);
            }

            .metric-item {
                text-align: center;
                padding: 20px 10px;
                border-right: 1px solid var(--admin-border);
            }

            .metric-item:last-child {
                border-right: 0;
            }

            .metric-icon {
                width: 34px;
                height: 34px;
                border-radius: 6px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 12px;
                font-size: 18px;
            }

            .metric-value {
                font-size: 15px;
                color: var(--admin-text);
                margin-bottom: 4px;
            }

            .metric-label {
                font-size: 12px;
                color: #536072;
            }

            .table-admin {
                font-size: 13px;
                margin-bottom: 0;
            }

            .table-admin th {
                font-weight: 500;
                color: #536072;
                border-color: var(--admin-border);
            }

            .table-admin td {
                color: #303846;
                border-color: var(--admin-border);
                padding-top: 18px;
                padding-bottom: 18px;
            }

            .stock-item {
                display: flex;
                align-items: center;
                gap: 16px;
                margin-bottom: 16px;
            }

            .stock-cover {
                width: 40px;
                height: 58px;
                object-fit: cover;
                border-radius: 2px;
                background-color: #D9DEE7;
            }

            .stock-title {
                font-size: 13px;
                font-weight: 600;
                margin-bottom: 4px;
            }

            .stock-subtitle {
                font-size: 12px;
                color: #7B8496;
            }

            .stock-badge {
                background-color: #FFE7E7;
                color: #F04444;
                font-size: 11px;
                border-radius: 12px;
                padding: 6px 8px;
                margin-left: auto;
            }

            .chart-box {
                height: 205px;
                position: relative;
                padding: 18px 14px;
            }

            .chart-svg {
                width: 100%;
                height: 150px;
            }

            .chart-legend {
                display: flex;
                justify-content: center;
                gap: 26px;
                font-size: 12px;
                color: #7B8496;
            }

            .legend-dot {
                width: 12px;
                height: 12px;
                border-radius: 50%;
                display: inline-block;
                margin-right: 6px;
            }

            @media (max-width: 992px) {
                .admin-layout {
                    display: block;
                }

                .admin-sidebar {
                    width: 100%;
                    min-height: auto;
                    padding: 20px;
                    border-right: 0;
                    border-bottom: 1px solid var(--admin-border);
                }

                .admin-brand {
                    margin-bottom: 22px;
                }

                .admin-sidebar-bottom {
                    margin-top: 22px;
                }

                .admin-topbar {
                    height: auto;
                    padding: 18px;
                    gap: 18px;
                }

                .admin-search {
                    width: 100%;
                }
            }
        </style>
    </head>

    <aside th:fragment="sidebar(activo)" class="admin-sidebar">
        <div class="admin-sidebar-top">
            <a th:href="@{/admin/dashboard}" class="admin-brand">
                <i class="fa-solid fa-book-bookmark"></i>
                <span>[[#{aplicacion.titulo}]]</span>
            </a>

            <nav class="admin-menu">
                <a th:href="@{/admin/dashboard}" th:classappend="${activo == 'dashboard'} ? 'active'">
                    <i class="fa-solid fa-house"></i>
                    <span>[[#{plantilla.dashboard}]]</span>
                </a>

                <a th:href="@{/admin/inventario}" th:classappend="${activo == 'inventario'} ? 'active'">
                    <i class="fa-solid fa-dolly"></i>
                    <span>[[#{plantilla.inventario}]]</span>
                </a>

                <a th:href="@{/admin/usuarios}" th:classappend="${activo == 'usuarios'} ? 'active'">
                    <i class="fa-regular fa-circle-user"></i>
                    <span>[[#{plantilla.usuarios}]]</span>
                </a>

                <a th:href="@{/admin/pedidos}" th:classappend="${activo == 'pedidos'} ? 'active'">
                    <i class="fa-regular fa-clipboard"></i>
                    <span>[[#{plantilla.pedidos}]]</span>
                </a>

                <a th:href="@{/admin/productos}" th:classappend="${activo == 'productos'} ? 'active'">
                    <i class="fa-regular fa-rectangle-list"></i>
                    <span>[[#{plantilla.productos}]]</span>
                </a>
            </nav>
        </div>

        <div class="admin-sidebar-bottom">
            <a th:href="@{/admin/configuracion}" th:classappend="${activo == 'configuracion'} ? 'active'">
                <i class="fa-solid fa-gear"></i>
                <span>[[#{plantilla.configuracion}]]</span>
            </a>

            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span>[[#{plantilla.cerrarSesion}]]</span>
                </button>
            </form>
        </div>
    </aside>

    <header th:fragment="topbar" class="admin-topbar">
        <div class="admin-search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" th:placeholder="#{admin.buscar.placeholder}"/>
        </div>

        <div class="admin-top-icons">
            <i class="fa-regular fa-bell"></i>
            <i class="fa-regular fa-user"></i>
        </div>
    </header>

    <section th:fragment="scripts">
        <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
    </section>
</html>
